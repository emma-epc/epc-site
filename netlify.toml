# Déploiement Netlify — site Next.js exporté en statique (dossier out/).
[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "20"

# ── Sécurité ────────────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

    # CSP en mode OBSERVATION (Report-Only) : ne bloque rien, journalise les
    # violations dans la console du navigateur. Taillée pour les ressources
    # réellement utilisées : scripts/styles/polices/images/vidéos du site
    # (self) + widget Calendly (script assets.calendly.com, iframe et appels
    # calendly.com). Après 1-2 semaines sans violation constatée, basculer en
    # application : renommer la clé en "Content-Security-Policy".
    # NB : 'unsafe-inline' est requis par les scripts d'amorçage inline de
    # Next.js (export statique) et par les attributs style inline de React.
    Content-Security-Policy-Report-Only = "default-src 'self'; script-src 'self' 'unsafe-inline' https://assets.calendly.com; style-src 'self' 'unsafe-inline' https://assets.calendly.com; img-src 'self' data: https://assets.calendly.com; font-src 'self'; media-src 'self'; connect-src 'self' https://calendly.com https://assets.calendly.com; frame-src https://calendly.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'; upgrade-insecure-requests"

# ── Cache longue durée (perf, aucun impact visuel) ─────────────────────────
# Les fichiers /_next/static/ portent un hash unique dans leur nom : un
# nouveau build = de nouveaux noms → cache "immutable" sans risque.
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Polices auto-hébergées : ne changent jamais sans renommage.
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Vidéos reels (fichiers lourds) : 30 jours. ⚠️ Si une vidéo est remplacée,
# changer le nom du fichier (ex. les-abattoirs-2.mp4), sinon les visiteurs
# récents garderont l'ancienne pendant 30 jours.
[[headers]]
  for = "/reels/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

# Logos clients : 7 jours (remplaçables sans renommage, léger différé toléré).
[[headers]]
  for = "/clients/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"
